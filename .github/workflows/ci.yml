name: CI

on:
  workflow_call:
  workflow_dispatch:
  schedule:
    - cron: "0 5 * * *"
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Check Format
        run: cargo fmt -- --check

      - name: Check Syntax
        run: cargo clippy --all-targets --all-features -- -D warnings -D clippy::pedantic

      - name: Build
        run: cargo build

      - name: Test
        run: cargo test
